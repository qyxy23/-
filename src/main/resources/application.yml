server:
  port: 8080

jwt:
  # 设置jwt签名加密时使用的秘钥
  admin-secret-key: mySuperLongSecretKeyForJWTWithMoreThan32Bytes!!
  # 设置jwt过期时间
  admin-ttl: 2592000000
  # 设置前端传递过来的令牌名称
  admin-token-name: authorization
  # 用户令牌
  user-secret-key: client
  user-ttl: 2592000000
  user-token-name: authorization

spring:
  profiles:
    active: dev
  main:
    allow-circular-references: true
  datasource:
    druid:
      driver-class-name: ${qingyou.datasource.driver-class-name}
      url: jdbc:mysql://${qingyou.datasource.host}:${qingyou.datasource.port}/${qingyou.datasource.database}?serverTimezone=Asia/Shanghai&useUnicode=true&characterEncoding=utf-8&zeroDateTimeBehavior=convertToNull&useSSL=false&allowPublicKeyRetrieval=true
      username: ${qingyou.datasource.username}
      password: ${qingyou.datasource.password}
  sql:
    init:
      mode: never
  rabbitmq:
    host: ${qingyou.rabbitmq.host}
    port: ${qingyou.rabbitmq.port}
    username: ${qingyou.rabbitmq.username}
    password: ${qingyou.rabbitmq.password} # 默认密码
    virtual-host: ${qingyou.rabbitmq.virtual-host} # 虚拟主机
    listener:
      simple:
        acknowledge-mode: manual # 手动确认模式
        concurrency: 5 # 消费者并发数
        max-concurrency: 10 # 最大消费者并发数
    template:
      retry:
        enabled: true # 启用重试机制
        initial-interval: 1000ms # 初始重试间隔
        max-interval: 10000ms # 最大重试间隔
        max-attempts: 3
  servlet:
    multipart:
      max-file-size: 10MB # 文件上传最大限制
      max-request-size: 10MB # 请求上传文件最大限制
  data:
    redis:
      host: ${qingyou.redis.host}
      port: ${qingyou.redis.port}
      database: ${qingyou.redis.database}
      password: ${qingyou.redis.password}
  jackson:
    serialization:
      write-dates-as-timestamps: false
  jpa:
    hibernate:
      ddl-auto: none # 临时禁用自动DDL，避免外键约束问题
#    show-sql: true
#    properties:
#      hibernate:
#              format_sql: true # 格式化 SQL，便于阅读

# PageHelper 分页插件配置
pagehelper:
  helper-dialect: mysql # 数据库方言（必选）
  reasonable: true # 自动调整分页参数（如pageNum≤0时设为1）
  support-methods-arguments: true # 支持通过Mapper接口参数传递分页参数
  params: count=countSql # 分页查询时自动执行count查询（统计总记录数）

mybatis:
  # 若有XML映射文件，配置路径（可选）
  mapper-locations: classpath*:mapper/**/*.xml
  # 实体类别名包（可选）
  type-aliases-package: com.guanyu.haigui.pojo.model
  configuration:
    map-underscore-to-camel-case: true
    default-fetch-size: 100
    default-statement-timeout: 30

minio:
  endpoint: ${qingyou.minio.endpoint}
  accesskey: ${qingyou.minio.accesskey}
  secretKey: ${qingyou.minio.secretKey}
  bucket:
    avatars: user-avatars

logging:
  level:
    com:
      qingyou:
        mapper: debug
        service: info
        controller: info

# SpringDoc OpenAPI 配置
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs
  group-configs:
    - group: "default"
      paths-to-match: "/**"
      packages-to-scan: com.guanyu.haigui.controller

# Knife4j配置
knife4j:
  enable: true
  production: false
  basic:
    enable: false
    username: admin
    password: admin
