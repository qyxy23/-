server:
  port: 8080
  address: 0.0.0.0

rocketmq:
  # NameServer（当前未启用 RocketMQ，保留占位）
  name-server: 127.0.0.1:9876

jwt:
  # 设置jwt签名加密时使用的秘钥
  admin-secret-key: mySuperLongSecretKeyForJWTWithMoreThan32Bytes!!
  # 设置jwt过期时间
  admin-ttl: 2592000000
  # 设置前端传递过来的令牌名称
  admin-token-name: authorization
  # 用户令牌
  user-secret-key: client
  user-ttl: 2592000000
  user-token-name: authorization

spring:
  profiles:
    # 服务器部署用 prod；本地 IDE 运行可加 VM 选项 -Dspring.profiles.active=dev
    active: prod
  main:
    allow-circular-references: true
  datasource:
    druid:
      driver-class-name: ${qingyou.datasource.driver-class-name}
      url: jdbc:mysql://${qingyou.datasource.host}:${qingyou.datasource.port}/${qingyou.datasource.database}?serverTimezone=Asia/Shanghai&useUnicode=true&characterEncoding=utf-8&zeroDateTimeBehavior=convertToNull&useSSL=false&allowPublicKeyRetrieval=true&connectTimeout=10000&socketTimeout=60000&tcpKeepAlive=true
      username: ${qingyou.datasource.username}
      password: ${qingyou.datasource.password}
      initial-size: 5
      min-idle: 5
      max-active: 20
      max-wait: 60000
      test-while-idle: true
      test-on-borrow: true
      test-on-return: false
      validation-query: SELECT 1
      validation-query-timeout: 3
      # 远程 MySQL wait_timeout 较短（约 30~60s），需更频繁检测/回收空闲连接
      time-between-eviction-runs-millis: 30000
      min-evictable-idle-time-millis: 30000
      max-evictable-idle-time-millis: 60000
      keep-alive: true
      # 必须大于 time-between-eviction-runs-millis
      keep-alive-between-time-millis: 60000
      phy-timeout-millis: 1800000
  sql:
    init:
      mode: never
  rabbitmq:
    host: ${qingyou.rabbitmq.host}
    port: ${qingyou.rabbitmq.port}
    username: ${qingyou.rabbitmq.username}
    password: ${qingyou.rabbitmq.password} # 默认密码
    virtual-host: ${qingyou.rabbitmq.virtual-host} # 虚拟主机
    listener:
      simple:
        acknowledge-mode: manual # 手动确认模式
        concurrency: 5 # 消费者并发数
        max-concurrency: 10 # 最大消费者并发数
    template:
      retry:
        enabled: true # 启用重试机制
        initial-interval: 1000ms # 初始重试间隔
        max-interval: 10000ms # 最大重试间隔
        max-attempts: 3
  servlet:
    multipart:
      max-file-size: 10MB # 文件上传最大限制
      max-request-size: 10MB # 请求上传文件最大限制
  data:
    redis:
      host: ${qingyou.redis.host}
      port: ${qingyou.redis.port}
      database: ${qingyou.redis.database}
      password: ${qingyou.redis.password}
      timeout: 5s
      connect-timeout: 5s
  jackson:
    serialization:
      write-dates-as-timestamps: false
  jpa:
    hibernate:
      ddl-auto: none # 临时禁用自动DDL，避免外键约束问题
#    show-sql: true
#    properties:
#      hibernate:
#              format_sql: true # 格式化 SQL，便于阅读

# PageHelper 分页插件配置
pagehelper:
  helper-dialect: mysql # 数据库方言（必选）
  reasonable: true # 自动调整分页参数（如pageNum≤0时设为1）
  support-methods-arguments: true # 支持通过Mapper接口参数传递分页参数
  params: count=countSql # 分页查询时自动执行count查询（统计总记录数）

mybatis:
  # 若有XML映射文件，配置路径（可选）
  mapper-locations: classpath*:mapper/**/*.xml
  # 实体类别名包（可选）
  type-aliases-package: com.guanyu.haigui.pojo.model
  configuration:
    map-underscore-to-camel-case: true
    default-fetch-size: 100
    default-statement-timeout: 30

cos:
  client:
    host: ${qingyou.cos.host}
    secret-id: ${qingyou.cos.secret-id}
    secret-key: ${qingyou.cos.secret-key}
    region: ${qingyou.cos.region}
    bucket: ${qingyou.cos.bucket}

BgeVector:
  host: ${qingyou.BgeVector.host}


logging:
  level:
    com:
      qingyou:
        mapper: debug
        service: info
        controller: info

# SpringDoc OpenAPI 配置
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs
  group-configs:
    - group: "default"
      paths-to-match: "/**"
      packages-to-scan: com.guanyu.haigui.controller

# Knife4j配置
knife4j:
  enable: true
  production: false
  basic:
    enable: false
    username: admin
    password: admin

# 海龟汤AI配置
haiqutang:
  ai:
    # 调试模式：true=使用模拟AI响应数据，false=调用真实AI服务
    debug-mode: false
  vector:
    index-name: "idx:clue_fragment"
    key-prefix: "hai_gui:vec:clue:"
    dimensions: 512
    auto-migrate: true
  play-quota:
    register-grant: 2
    approval-grant: 5
    reject-cooldown-days: 7
  replay-cache:
    ttl-days: 3
